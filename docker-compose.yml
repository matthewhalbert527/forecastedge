services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forecastedge
      POSTGRES_USER: forecastedge
      POSTGRES_PASSWORD: forecastedge
    ports:
      - "5432:5432"
    volumes:
      - forecastedge-postgres:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  forecastedge-postgres:
