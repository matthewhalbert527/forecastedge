services:
  - type: web
    name: forecastedge-api
    runtime: node
    plan: standard
    buildCommand: npm install --include=dev && npm run db:generate && npm run build:api
    preDeployCommand: npm run db:push:render
    startCommand: npm run start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_MODE
        value: paper
      - key: PAPER_LEARNING_MODE
        value: "true"
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: REQUIRE_MANUAL_CONFIRMATION
        value: "true"
      - key: KILL_SWITCH_ENABLED
        value: "true"
      - key: RUN_BACKGROUND_WORKER
        value: "true"
      - key: RUN_ON_STARTUP
        value: "false"
      - key: BACKGROUND_POLL_INTERVAL_MINUTES
        value: "30"
      - key: BACKGROUND_WORKER_MAX_RSS_MB
        value: "1600"
      - key: RUN_QUOTE_REFRESH_WORKER
        value: "true"
      - key: QUOTE_REFRESH_INTERVAL_MINUTES
        value: "5"
      - key: QUOTE_REFRESH_MAX_TICKERS
        value: "40"
      - key: QUOTE_REFRESH_MAX_PAPER_ORDERS
        value: "10"
      - key: RUN_LEARNING_CYCLE_WORKER
        value: "true"
      - key: LEARNING_CYCLE_INTERVAL_MINUTES
        value: "360"
      - key: LEARNING_CYCLE_MIN_SETTLED_EXAMPLES
        value: "10"
      - key: LEARNING_CYCLE_BACKTEST_LOOKBACK_DAYS
        value: "30"
      - key: FORECASTEDGE_API_TOKEN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SCHEDULED_JOB_TOKEN
        sync: false
      - key: STRATEGY_OPTIMIZER_SELECTION_GRID
        value: first_signal,best_quality,best_edge
      - key: STRATEGY_OPTIMIZER_MAX_RUNS
        value: "8"
      - key: RESEND_API_KEY
        sync: false
      - key: DAILY_REPORT_EMAIL_TO
        sync: false
      - key: DAILY_REPORT_EMAIL_FROM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GPT_ANALYSIS_ENABLED
        value: "false"
      - key: GPT_ANALYSIS_MODEL
        value: gpt-5.4-mini
      - key: GPT_REVIEW_EMAIL_LAYERS
        value: daily
      - key: GPT_REVIEW_MAX_INPUT_CHARS
        value: "60000"
      - key: GPT_AUTO_APPLY_PATCHES
        value: "false"
      - key: GPT_AUTO_APPLY_MIN_SETTLED_EXAMPLES
        value: "10"
      - key: FORECAST_CACHE_MINUTES
        value: "45"
      - key: OPEN_METEO_COOLDOWN_MINUTES
        value: "60"
      - key: DATABASE_URL
        fromDatabase:
          name: forecastedge-db
          property: connectionString
      - key: OPEN_METEO_BASE_URL
        value: https://api.open-meteo.com/v1
      - key: NWS_BASE_URL
        value: https://api.weather.gov
      - key: NWS_USER_AGENT
        value: ForecastEdge/0.1 contact@example.com
      - key: KALSHI_PROD_BASE_URL
        value: https://api.elections.kalshi.com/trade-api/v2
      - key: KALSHI_DEMO_BASE_URL
        value: https://demo-api.kalshi.co/trade-api/v2
      - key: KALSHI_WEATHER_SERIES_TICKERS
        value: KXHIGHNY,KXHIGHMIA,KXHIGHCHI,KXHIGHAUS,KXHIGHLAX,KXHIGHOKC,KXHIGHBOS,KXHIGHPHIL,KXHIGHDEN,KXHIGHPHX,KXHIGHLAS,KXHIGHSEA,KXHIGHATL,KXHIGHDC,KXHIGHDAL,KXHIGHHOU
      - key: KALSHI_MARKET_DISCOVERY_LIMIT
        value: "100"
      - key: KALSHI_MARKET_DISCOVERY_MAX_PAGES
        value: "1"
      - key: SCHEDULED_HISTORICAL_SERIES_TICKERS
        value: KXHIGHNY,KXHIGHMIA,KXHIGHCHI,KXHIGHAUS,KXHIGHLAX,KXHIGHOKC,KXHIGHBOS,KXHIGHPHIL,KXHIGHDEN,KXHIGHPHX,KXHIGHLAS,KXHIGHSEA,KXHIGHATL,KXHIGHDC,KXHIGHDAL,KXHIGHHOU
      - key: SCHEDULED_HISTORICAL_LOOKBACK_DAYS
        value: "7"
      - key: SCHEDULED_HISTORICAL_MAX_SERIES
        value: "3"
      - key: SCHEDULED_HISTORICAL_MAX_MARKETS_PER_SERIES
        value: "8"

  - type: cron
    name: forecastedge-historical-refresh
    runtime: node
    plan: starter
    schedule: "30 7 * * *"
    buildCommand: npm install --include=dev
    startCommand: node scripts/run-scheduled-job.mjs refresh_historical_market_data
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORECASTEDGE_API_URL
        value: https://forecastedge-api.onrender.com
      - key: SCHEDULED_JOB_TOKEN
        sync: false

  - type: cron
    name: forecastedge-counterfactual-replay
    runtime: node
    plan: starter
    schedule: "45 7 * * *"
    buildCommand: npm install --include=dev
    startCommand: node scripts/run-scheduled-job.mjs run_counterfactual_replay
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORECASTEDGE_API_URL
        value: https://forecastedge-api.onrender.com
      - key: SCHEDULED_JOB_TOKEN
        sync: false

  - type: cron
    name: forecastedge-nightly-optimizer
    runtime: node
    plan: starter
    schedule: "0 8 * * *"
    buildCommand: npm install --include=dev
    startCommand: node scripts/run-scheduled-job.mjs optimize_strategy_candidates
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORECASTEDGE_API_URL
        value: https://forecastedge-api.onrender.com
      - key: SCHEDULED_JOB_TOKEN
        sync: false

  - type: cron
    name: forecastedge-daily-alpha-report
    runtime: node
    plan: starter
    schedule: "0 13 * * *"
    buildCommand: npm install --include=dev
    startCommand: node scripts/run-scheduled-job.mjs run_nightly_backtests
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORECASTEDGE_API_URL
        value: https://forecastedge-api.onrender.com
      - key: SCHEDULED_JOB_TOKEN
        sync: false

  - type: cron
    name: forecastedge-gpt-intraday-review
    runtime: node
    plan: starter
    schedule: "15 * * * *"
    buildCommand: npm install --include=dev
    startCommand: node scripts/run-scheduled-job.mjs run_gpt_intraday_review
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORECASTEDGE_API_URL
        value: https://forecastedge-api.onrender.com
      - key: SCHEDULED_JOB_TOKEN
        sync: false

  - type: cron
    name: forecastedge-gpt-deep-review
    runtime: node
    plan: starter
    schedule: "35 */6 * * *"
    buildCommand: npm install --include=dev
    startCommand: node scripts/run-scheduled-job.mjs run_gpt_deep_review
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORECASTEDGE_API_URL
        value: https://forecastedge-api.onrender.com
      - key: SCHEDULED_JOB_TOKEN
        sync: false

  - type: cron
    name: forecastedge-gpt-daily-review
    runtime: node
    plan: starter
    schedule: "0 14 * * *"
    buildCommand: npm install --include=dev
    startCommand: node scripts/run-scheduled-job.mjs run_gpt_daily_review
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORECASTEDGE_API_URL
        value: https://forecastedge-api.onrender.com
      - key: SCHEDULED_JOB_TOKEN
        sync: false

  - type: web
    name: forecastedge-web
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build:web
    startCommand: npm run start:web
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORECASTEDGE_API_URL
        value: https://forecastedge-api.onrender.com
      - key: FORECASTEDGE_API_TOKEN
        sync: false

databases:
  - name: forecastedge-db
    plan: basic-256mb
