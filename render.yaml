services:
  - type: web
    name: forecastedge-api
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run db:generate && npm run build:api
    preDeployCommand: npm run db:push:render
    startCommand: npm run start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_MODE
        value: paper
      - key: PAPER_LEARNING_MODE
        value: "true"
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: REQUIRE_MANUAL_CONFIRMATION
        value: "true"
      - key: KILL_SWITCH_ENABLED
        value: "true"
      - key: RUN_BACKGROUND_WORKER
        value: "true"
      - key: RUN_ON_STARTUP
        value: "true"
      - key: BACKGROUND_POLL_INTERVAL_MINUTES
        value: "15"
      - key: RUN_QUOTE_REFRESH_WORKER
        value: "true"
      - key: QUOTE_REFRESH_INTERVAL_MINUTES
        value: "1"
      - key: QUOTE_REFRESH_MAX_PAPER_ORDERS
        value: "1000"
      - key: SCHEDULED_JOB_TOKEN
        sync: false
      - key: FORECAST_CACHE_MINUTES
        value: "45"
      - key: OPEN_METEO_COOLDOWN_MINUTES
        value: "60"
      - key: DATABASE_URL
        fromDatabase:
          name: forecastedge-db
          property: connectionString
      - key: OPEN_METEO_BASE_URL
        value: https://api.open-meteo.com/v1
      - key: NWS_BASE_URL
        value: https://api.weather.gov
      - key: NWS_USER_AGENT
        value: ForecastEdge/0.1 contact@example.com
      - key: KALSHI_PROD_BASE_URL
        value: https://api.elections.kalshi.com/trade-api/v2
      - key: KALSHI_DEMO_BASE_URL
        value: https://demo-api.kalshi.co/trade-api/v2
      - key: KALSHI_WEATHER_SERIES_TICKERS
        value: KXHIGHNY,KXHIGHMIA,KXHIGHCHI,KXHIGHAUS,KXHIGHLAX,KXHIGHOKC,KXHIGHBOS,KXHIGHPHIL,KXHIGHDEN,KXHIGHPHX,KXHIGHLAS,KXHIGHSEA,KXHIGHATL,KXHIGHDC,KXHIGHDAL,KXHIGHHOU

  - type: cron
    name: forecastedge-nightly-optimizer
    runtime: node
    plan: starter
    schedule: "0 8 * * *"
    buildCommand: npm install --include=dev
    startCommand: node scripts/run-scheduled-job.mjs optimize_strategy_candidates
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORECASTEDGE_API_URL
        value: https://forecastedge-api.onrender.com
      - key: SCHEDULED_JOB_TOKEN
        sync: false

  - type: web
    name: forecastedge-web
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build:web
    startCommand: npm run start:web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: forecastedge-db
    plan: free
